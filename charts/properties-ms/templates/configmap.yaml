apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "properties-ms.fullname" . }}-config
  labels:
    {{- include "properties-ms.labels" . | nindent 4 }}
data:
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  USERS_MS_URL: {{ .Values.config.usersMsUrl | quote }}
  BOOKINGS_MS_URL: {{ .Values.config.bookingsMsUrl | quote }}
