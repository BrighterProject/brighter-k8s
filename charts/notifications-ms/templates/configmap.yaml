apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "notifications-ms.fullname" . }}-config
  labels:
    {{- include "notifications-ms.labels" . | nindent 4 }}
data:
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  DEFAULT_FROM_EMAIL: {{ .Values.config.fromEmail | quote }}
  FRONTEND_BASE_URL: {{ .Values.config.frontendBaseUrl | quote }}
