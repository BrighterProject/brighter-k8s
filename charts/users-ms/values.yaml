# Standalone defaults (overridden by umbrella values.yaml in practice)
replicaCount: 1

image:
  repository: ghcr.io/brighterbg/brighter-users-ms
  tag: latest
  pullPolicy: IfNotPresent

service:
  port: 8000

config:
  logLevel: INFO
  accessTokenExpireMinutes: "120"
  redisUrl: redis://brighter-redis-master:6379/0
  contactEmail: brighter.bg@gmail.com
  contactRateLimit: "5"
  contactRateWindow: "3600"

secrets:
  name: users-ms-secrets

resources:
  requests:
    memory: 128Mi
    cpu: 100m
  limits:
    memory: 256Mi

hpa:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

global:
  domain: xn--80aalycsf6f.xn--90ae
  dbSecretName: brighter-db-app
