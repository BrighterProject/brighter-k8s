replicaCount: 1
image:
  repository: ghcr.io/brighterbg/brighter-payments-ms
  tag: latest
  pullPolicy: IfNotPresent
service:
  port: 8003
config:
  bookingsMsUrl: http://bookings-ms:8002
  stripeSuccessUrl: http://brighter.bg/bookings?payment=success
