# bookings-ms routing:
# Priority 10 (public): OPTIONS preflight + GET /bookings/slots (rate limited 60/min per IP via slowapi)
# Priority 5 (protected): all other bookings endpoints require JWT
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "bookings-ms.fullname" . }}-public
  labels:
    {{- include "bookings-ms.labels" . | nindent 4 }}
spec:
  entryPoints:
    - {{ .Values.global.entryPoint | default "web" }}
  routes:
    - match: "Host(`{{ .Values.global.domain }}`) && ((Method(`OPTIONS`) && PathPrefix(`/api/bookings`)) || (Method(`GET`) && Path(`/api/bookings/slots`)))"
      priority: 10
      middlewares:
        - name: {{ include "bookings-ms.apiStripMiddleware" . }}
      services:
        - name: bookings-ms
          port: {{ .Values.service.port }}
  {{- if .Values.global.tls.enabled }}
  tls:
    certResolver: {{ .Values.global.tls.certResolver }}
  {{- end }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "bookings-ms.fullname" . }}-protected
  labels:
    {{- include "bookings-ms.labels" . | nindent 4 }}
spec:
  entryPoints:
    - {{ .Values.global.entryPoint | default "web" }}
  routes:
    - match: "Host(`{{ .Values.global.domain }}`) && PathPrefix(`/api/bookings`)"
      priority: 5
      middlewares:
        - name: {{ include "bookings-ms.jwtAuthMiddleware" . }}
        - name: {{ include "bookings-ms.apiStripMiddleware" . }}
      services:
        - name: bookings-ms
          port: {{ .Values.service.port }}
  {{- if .Values.global.tls.enabled }}
  tls:
    certResolver: {{ .Values.global.tls.certResolver }}
  {{- end }}
