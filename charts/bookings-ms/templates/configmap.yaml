apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "bookings-ms.fullname" . }}-config
  labels:
    {{- include "bookings-ms.labels" . | nindent 4 }}
data:
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  USERS_MS_URL: {{ .Values.config.usersMsUrl | quote }}
  PROPERTIES_MS_URL: {{ .Values.config.propertiesMsUrl | quote }}
  PAYMENTS_MS_URL: {{ .Values.config.paymentsMsUrl | quote }}
  REDIS_URL: {{ .Values.config.redisUrl | quote }}
