# Staging overrides — higher replica counts, DEBUG logging, smaller resources
global:
  domain: staging.площадка.бг

postgresql:
  instances: 1
  storage:
    size: 5Gi

users-ms:
  replicaCount: 1
  config:
    logLevel: DEBUG
    accessTokenExpireMinutes: "60"

properties-ms:
  replicaCount: 1
  config:
    logLevel: DEBUG

bookings-ms:
  replicaCount: 1
  config:
    logLevel: DEBUG

payments-ms:
  replicaCount: 1
  config:
    stripeSuccessUrl: http://staging.brighter.bg/bookings?payment=success
    stripeCancelUrl: http://staging.brighter.bg/bookings?payment=cancelled

notifications-ms:
  replicaCount: 1
  config:
    logLevel: DEBUG
    frontendBaseUrl: http://staging.brighter.bg
